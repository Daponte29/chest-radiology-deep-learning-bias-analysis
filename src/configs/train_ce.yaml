# Experiment 4 — Canny Edge (shape bias): edge-filtered train images, original validation.
# Stylized images already generated in src/data/1 with _ce suffix.

seed: 42

paths:
  image_root:    src/data/1
  train_parquet: src/data/train_manifest_ce.parquet
  valid_parquet: src/data/valid_manifest.parquet
  test_parquet:  src/data/test_manifest_ce.parquet
  output_dir:    results/ce/

labels:
  - Enlarged Cardiomediastinum
  - Cardiomegaly
  - Lung Opacity
  - Edema
  - Pneumonia
  - Support Devices

model:
  name:        densenet121
  pretrained:  true

training:
  batch_size:               16
  num_epochs:               10
  learning_rate:            0.0001
  betas:                    [0.9, 0.999]
  eps:                      1.0e-8
  weight_decay:             1.0e-5
  img_size:                 224
  num_workers:              4
  amp:                      true
  focal_gamma:              2.0
  weighted_sampler:         true
  early_stopping_patience:  3
