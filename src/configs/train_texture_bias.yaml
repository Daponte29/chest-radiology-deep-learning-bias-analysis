# Experiment 3 — Texture-biased training: Gaussian-blurred radiographs.
# Generate images first:
#   python scripts/generate_stylized_data.py --mode texture_bias --input src/data/1 --output src/data/stylized_texture

seed: 42

paths:
  image_root:    src/data/stylized_texture
  train_parquet: src/data/train_manifest.parquet
  valid_parquet: src/data/valid_manifest.parquet
  output_dir:    results/texture_bias/

model:
  name:        densenet121
  num_classes: 14
  pretrained:  true

training:
  batch_size:    16
  num_epochs:    10
  learning_rate: 0.0001
  weight_decay:  1.0e-5
  img_size:      224
  num_workers:   4
