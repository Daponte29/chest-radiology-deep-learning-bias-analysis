# Nick — Baseline (original images)
# Results → results/michael/original/

seed: 42

paths:
  image_root:    src/data/1
  train_parquet: src/data/train_manifest.parquet
  valid_parquet: src/data/valid_manifest.parquet
  test_parquet:  src/data/test_manifest.parquet
  output_dir:    results/michael/original/

labels:
  - Enlarged Cardiomediastinum
  - Cardiomegaly
  - Lung Opacity
  - Edema
  - Pneumonia
  - Support Devices

model:
  name:        densenet121
  pretrained:  true

training:
  loss:                     focal   # focal | bce
  focal_gamma:              2.0
  weighted_sampler:         true
  blend_ratio:              1.0
  optimizer:                adam    # adam | sgd
  learning_rate:            0.0001
  betas:                    [0.9, 0.999]
  eps:                      1.0e-8
  momentum:                 0.9
  weight_decay:             1.0e-5
  scheduler:                cosine  # cosine | step
  eta_min:                  1.0e-6
  step_size:                3
  step_gamma:               0.1
  augmentation:
    horizontal_flip:        true
    color_jitter:           0.15
  batch_size:               16
  num_epochs:               10
  img_size:                 224
  num_workers:              4
  amp:                      true
  early_stopping_patience:  3
