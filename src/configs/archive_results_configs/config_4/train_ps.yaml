# Nick â€” Patch Shuffle (texture bias)
# Config 4 — ps model

seed: 42

paths:
  image_root:          data/raw/1
  train_parquet:       data/processed/train_manifest_ps.parquet
  train_parquet_blend: data/processed/train_manifest.parquet
  valid_parquet:       data/processed/valid_manifest.parquet
  test_parquet:        data/processed/test_manifest_ps.parquet
  output_dir:    src/configs/archive_results_configs/config_4/results/ps/

labels:
  - Enlarged Cardiomediastinum
  - Cardiomegaly
  - Lung Opacity
  - Lung Lesion
  - Edema
  - Consolidation
  - Pneumonia
  - Atelectasis
  - Pneumothorax
  - Pleural Effusion
  - Pleural Other
  - Fracture
  - No Finding
  - Support Devices

model:
  name:       densenet121  # options: densenet121 | densenet169 | densenet201
  pretrained: true         # true = ImageNet weights | false = train from scratch

training:

  # Loss function ---------------------------------------------------------------
  loss:        focal  # options: focal | bce
  focal_gamma: 2.0    # focal only â€” focusing strength. 0.0 = same as bce. typical range: 1.0â€“3.0

  # Class imbalance -------------------------------------------------------------
  weighted_sampler: false  # true = upsample rare-label images | false = uniform sampling

  # Blending --------------------------------------------------------------------
  blend_ratio: 0.5    # 0.5 = 50% shuffled + 50% original | 1.0 = 100% shuffled (no blending)

  # Optimizer -------------------------------------------------------------------
  optimizer:     adam
  learning_rate: 0.0001
  betas:         [0.9, 0.999]  # adam only
  eps:           1.0e-8        # adam only
  momentum:      0.9           # sgd only
  weight_decay:  1.0e-5

  # LR Scheduler ----------------------------------------------------------------
  scheduler:  cosine  # options: cosine | step
  eta_min:    1.0e-6  # cosine only â€” LR floor
  step_size:  3       # step only â€” decay every N epochs
  step_gamma: 0.1     # step only â€” multiply LR by this (0.1 = drop 10x)

  # Augmentation ----------------------------------------------------------------
  augmentation:
    horizontal_flip: true   # true | false
    color_jitter:    0.1    # brightness/contrast jitter | 0.0 to disable

  # General ---------------------------------------------------------------------
  batch_size:              128
  num_epochs:              15
  img_size:                224
  num_workers:             8     # 0 to disable multiprocessing
  amp:                     true  # mixed precision | false if issues arise
  early_stopping_patience: 5     # stops training if validation auc doesn't improve for this many epochs


