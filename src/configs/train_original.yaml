# Experiment 1 — Baseline: train on original (unmodified) CheXpert frontal radiographs.
# Establishes the performance ceiling before any style-transfer perturbation.

seed: 42

paths:
  image_root:    src/data/1
  train_parquet: src/data/train_manifest.parquet
  valid_parquet: src/data/valid_manifest.parquet
  test_parquet:  src/data/test_manifest.parquet
  output_dir:    results/original/

labels:
  - Enlarged Cardiomediastinum
  - Cardiomegaly
  - Lung Opacity
  - Edema
  - Pneumonia
  - Support Devices

model:
  name:        densenet121
  pretrained:  true

training:
  # --- Loss ---
  loss:                     focal   # focal | bce
  focal_gamma:              2.0     # only used when loss: focal

  # --- Sampler & blending ---
  weighted_sampler:         true
  blend_ratio:              1.0     # 1.0 = no blending (original uses only its own images)

  # --- Optimizer ---
  optimizer:                adam    # adam | sgd
  learning_rate:            0.0001
  betas:                    [0.9, 0.999]  # adam only
  eps:                      1.0e-8        # adam only
  momentum:                 0.9           # sgd only
  weight_decay:             1.0e-5

  # --- Scheduler ---
  scheduler:                cosine  # cosine | step
  eta_min:                  1.0e-6  # cosine only — floor LR
  step_size:                3       # step only — decay every N epochs
  step_gamma:               0.1     # step only — multiply LR by this

  # --- Augmentation ---
  augmentation:
    horizontal_flip:        true
    color_jitter:           0.15    # 0.0 to disable

  # --- General ---
  batch_size:               16
  num_epochs:               10
  img_size:                 224
  num_workers:              4
  amp:                      true
  early_stopping_patience:  3
