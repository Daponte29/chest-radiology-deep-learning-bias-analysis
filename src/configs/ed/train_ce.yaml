# Ed — Canny Edge — shape bias experiment.
# Training images are replaced with their Canny edge maps so only structural
# edges remain and all texture information is removed.
# Results → results/ed/ce/

seed: 42

paths:
  image_root:          src/data/1
  train_parquet:       src/data/train_manifest_ce.parquet   # edge-filtered training images
  train_parquet_blend: src/data/train_manifest.parquet      # original images mixed in via blend_ratio
  valid_parquet:       src/data/valid_manifest.parquet      # always original — used for checkpoint selection
  test_parquet:        src/data/test_manifest_ce.parquet
  output_dir:          results/ed/ce/

labels:
  - Enlarged Cardiomediastinum
  - Cardiomegaly
  - Lung Opacity
  - Edema
  - Pneumonia
  - Support Devices

model:
  name:       densenet121  # options: densenet121 | densenet169 | densenet201
  pretrained: true         # true = start from ImageNet weights | false = train from scratch

training:

  # Loss function ---------------------------------------------------------------
  loss:        focal  # options: focal | bce
  focal_gamma: 2.0    # focal only — focusing strength. 0.0 = same as bce. typical range: 1.0–3.0

  # Class imbalance -------------------------------------------------------------
  weighted_sampler: true  # true = upsample rare-label images | false = uniform sampling

  # Blending --------------------------------------------------------------------
  blend_ratio: 0.3    # 0.3 = 30% edge-filtered + 70% original each epoch
                      # 1.0 = 100% edge-filtered (pure bias experiment, no blending)
                      # 0.0 = 100% original (same as baseline — not useful here)

  # Optimizer -------------------------------------------------------------------
  optimizer:     adam    # options: adam | sgd
  learning_rate: 0.0001
  betas:         [0.9, 0.999]  # adam only
  eps:           1.0e-8        # adam only
  momentum:      0.9           # sgd only
  weight_decay:  1.0e-5        # increase (e.g. 5e-5) to fight overfitting

  # LR Scheduler ----------------------------------------------------------------
  scheduler:  cosine  # options: cosine | step
  eta_min:    1.0e-6  # cosine only — LR floor
  step_size:  3       # step only — decay every N epochs
  step_gamma: 0.1     # step only — multiply LR by this (0.1 = drop 10x)

  # Augmentation ----------------------------------------------------------------
  augmentation:
    horizontal_flip: true   # true | false
    color_jitter:    0.15   # brightness/contrast jitter | 0.0 to disable

  # General ---------------------------------------------------------------------
  batch_size:              16
  num_epochs:              10
  img_size:                224
  num_workers:             4     # 0 to disable multiprocessing
  amp:                     true  # mixed precision | false if issues arise
  early_stopping_patience: 3     # stops training if validation auc doesn't improve for this many epochs
